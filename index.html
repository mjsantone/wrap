:root { --accent: #FF5A36; --ink: #100F12; --paper: #F4F1EA; --muted: #8a8d94; }
/* WrapRuntime styles — the player stage, card flip mechanics, and every
 * rendered component. Shared by all pages; page chrome lives in each page. */

* { box-sizing: border-box; }
html, body { height: 100%; }
body { margin: 0; background: #000; }

.player-stage {
  position: fixed; inset: 0; margin: 0; background: #000;
  display: grid; place-items: center;
  font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.player-stage[hidden] { display: none; }
.screen {
  position: relative;
  width: min(100vw, calc(100vh * 640 / 910));
  aspect-ratio: 640 / 910;
  background: #000; overflow: hidden;
  touch-action: pan-y;
  /* swiping must never select card text */
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
/* Modern phones are much taller than the 640×910 design canvas — fill the
 * whole screen and let the card background absorb the extra height; the
 * runtime centers the canvas vertically (rescale in runtime.js). */
@media (max-aspect-ratio: 640/910) {
  .screen { width: 100vw; height: 100vh; height: 100dvh; aspect-ratio: auto; }
}

/* ---- WRAP card mechanics (values from wrap.co/wraps/main.css) ---- */
.card-container {
  position: absolute; inset: 0; background: #000;
  perspective: 2000px; perspective-origin: left center;
}
.card {
  position: absolute; inset: 0; overflow: hidden;
  transform-origin: 0 0; transform: rotateY(0deg);
  transition: transform 0.7s cubic-bezier(0.26, 0.65, 0.37, 1.07);
  will-change: transform; background: #fff;
}
.card.turned { transform: rotateY(-90deg); }
.card .fold {
  position: absolute; inset: 0; z-index: 990; pointer-events: none;
  background: linear-gradient(100deg, rgba(0,0,0,0.55), rgba(0,0,0,0.05) 60%);
  opacity: 0; transition: opacity 0.7s cubic-bezier(0.26, 0.65, 0.37, 1.07);
}
.card.turned .fold { opacity: 1; }
@keyframes bounceCardHintAnimation {
  0%, 40%, 57%, 100% { animation-timing-function: cubic-bezier(0.215,0.61,0.355,1); transform: rotateY(0rad); }
  30% { animation-timing-function: cubic-bezier(0.755,0.05,0.855,0.06); transform: rotateY(-0.6rad); }
  50% { animation-timing-function: cubic-bezier(0.755,0.05,0.855,0.06); transform: rotateY(-0.2rad); }
}
.card.animate-swipe-hint { animation: 1.9s 2s 1 bounceCardHintAnimation; }

.canvas { position: absolute; top: 0; left: 0; width: 640px; height: var(--canvas-h, 910px); transform-origin: 0 0; }
.canvas p { margin: 0 0 0.4em; }
.canvas p:last-child { margin-bottom: 0; }

/* ---- rendered components ---- */
.cmp { position: absolute; margin: 0; }
.cmp-image { overflow: hidden; }
.img-ph { position: absolute; inset: 0; display: grid; place-items: center; }
/* generated photograph over its duotone placeholder, fading in on load */
.img-real {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0; transition: opacity 0.6s ease;
}
.img-real.loaded { opacity: 1; }
.img-ph span {
  font-family: 'Montserrat', sans-serif; font-size: 15px; letter-spacing: 0.24em;
  text-transform: uppercase; color: rgba(255,255,255,0.4); text-align: center;
  border: 1px solid rgba(255,255,255,0.22); border-radius: 999px; padding: 8px 18px;
  max-width: 80%;
}
.cmp-gradation { pointer-events: none;
  background: linear-gradient(180deg, rgba(22,23,24,0) 38%, rgba(22,23,24,0.55) 72%, rgba(22,23,24,0.85) 100%); }
.cmp-veil { pointer-events: none; background: rgba(16,17,20,0.45); }
.cmp-outline { pointer-events: none; }
.cmp-outline::after { content: ""; position: absolute; inset: 40px; border: 3px solid rgba(253,254,255,0.92); }
.cmp-action { display: block; z-index: 900; }
.cmp-button { display: grid; place-items: center; white-space: nowrap; }
.cmp-location {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  color: #fff; text-decoration: none; font-size: 24px;
  border: 2px solid rgba(255,255,255,0.85); border-radius: 6px;
  background: rgba(0,0,0,0.25) !important;
}
.cmp-map { display: block; overflow: hidden; text-decoration: none; }
.cmp-map > svg.map-bg { position: absolute; inset: 0; width: 100%; height: 100%; }
.cmp-map .map-pin {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.cmp-map .map-pin span {
  font-family: 'Open Sans', sans-serif; font-size: 28px; color: #fff;
  background: rgba(0,0,0,0.55); border-radius: 8px; padding: 10px 22px;
  max-width: 80%; text-align: center;
}
.cmp-flow {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  color: #fff; font-size: 28px; font-family: 'Open Sans', sans-serif;
  border: 2px solid rgba(255,255,255,0.85); border-radius: 10px;
  background: rgba(0,0,0,0.3);
}
.cmp-youtube { display: block; }
.cmp-youtube svg { width: 100%; height: 100%; display: block; transition: transform 0.15s ease; }
.cmp-youtube:hover svg { transform: scale(1.08); }
.cmp-widget {
  display: flex; align-items: center; justify-content: center;
  color: #fff; text-decoration: none; font-size: 26px; font-family: 'Open Sans', sans-serif;
  border: 2px solid rgba(255,255,255,0.9); border-radius: 8px;
  background: rgba(0,0,0,0.3) !important;
  transition: background 0.2s;
}
.cmp-widget:hover { background: rgba(255,90,54,0.35) !important; }
.cmp-end { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.cmp-end p { color: #fff; font-weight: 200; font-size: 26px; margin: 5px 0; font-family: 'Open Sans', sans-serif; max-width: 85%; }
.cmp-end .end-wordmark { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 34px; letter-spacing: 0.04em; color: #fff; margin-top: 6px; }
.cmp-end .end-wordmark b { color: var(--accent); }
.cmp-end .replay {
  margin-top: 28px; cursor: pointer; font-family: 'Open Sans', sans-serif; font-size: 22px;
  color: #fff; background: #434343; border: none; border-radius: 3px; padding: 12px 40px;
  box-shadow: 0 2px 0 rgba(35,31,32,0.25); transition: all 0.2s ease-in-out;
}
.cmp-end .replay:hover { background: var(--accent); color: #212121; }

/* ---- galleries ---- */
.cmp-gallery { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  scroll-snap-type: y mandatory; scrollbar-width: none; }
.cmp-gallery::-webkit-scrollbar { display: none; }
.cmp-gallery-item { position: relative; width: 640px; height: var(--canvas-h, 910px); scroll-snap-align: start; overflow: hidden; }
.gallery-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 970; color: #fff; opacity: 0.75; pointer-events: none;
  animation: hintBob 1.6s ease-in-out infinite;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8)); transition: opacity 0.4s;
}
.gallery-hint.hidden { opacity: 0; }
@keyframes hintBob { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 8px); } }

/* ---- player chrome ---- */
.pagination-track { position: absolute; left: 0; right: 0; bottom: 0; height: 5px;
  background: #000; z-index: 1000; pointer-events: none; overflow: hidden; }
.pagination-track .current-page { position: absolute; height: 100%; background: var(--accent); transition: left 0.12s ease-out; }
.pv-btn {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 995;
  width: 46px; height: 70px; border: none; background: transparent; cursor: pointer;
  color: #fff; opacity: 0.15; transition: opacity 0.25s ease-out;
  display: grid; place-items: center; padding: 0;
}
.pv-btn:hover, .pv-btn:focus-visible { opacity: 0.9; }
.pv-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -4px; border-radius: 8px; }
.pv-btn[hidden] { display: none; }
.pv-btn.prev { left: 2px; } .pv-btn.next { right: 2px; }
.pv-btn svg { filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7)); }
.tap-zone { position: absolute; top: 60px; bottom: 40px; width: 15%; z-index: 960; cursor: pointer; }
.tap-zone.left { left: 0; } .tap-zone.right { right: 0; }

@media (prefers-reduced-motion: reduce) {
  .card, .card .fold { transition: none; }
  .card.animate-swipe-hint, .gallery-hint { animation: none; }
}


  /* ================= Homepage — modern editorial ================= */
  .home {
    min-height: 100vh; background: var(--ink); color: var(--paper);
    display: flex; flex-direction: column;
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    padding: 26px clamp(20px, 6vw, 72px) 32px;
  }
  .home.hidden { display: none; }
  .home-inner { width: 100%; max-width: 780px; margin: 0 auto; display: flex; flex-direction: column; flex: 1; }

  .masthead {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 16px; border-bottom: 1px solid rgba(244,241,234,0.14);
  }
  .wordmark {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600;
    font-size: 26px; letter-spacing: 0.01em; color: var(--paper); margin: 0;
  }
  .wordmark b { color: var(--accent); font-weight: 600; }
  .masthead nav a {
    font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted); text-decoration: none; margin-left: 26px;
  }
  .masthead nav a:hover { color: var(--accent); }

  .hero { margin: clamp(36px, 8vh, 88px) 0 0; }
  .hero h1 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 550;
    font-size: clamp(54px, 10vw, 112px); line-height: 0.98; letter-spacing: -0.015em;
    margin: 0 0 24px;
  }
  .hero h1 em { font-style: italic; font-weight: 460; }
  .hero h1 b { color: var(--accent); font-weight: inherit; font-style: normal; }
  .lede {
    font-size: 17px; line-height: 1.65; color: rgba(244,241,234,0.7);
    max-width: 52ch; margin: 0;
  }

  .prompt-box { margin-top: 36px; }
  .prompt-box textarea {
    width: 100%; min-height: 126px; resize: vertical;
    background: transparent; color: var(--paper);
    border: 1px solid rgba(244,241,234,0.22); border-radius: 2px;
    padding: 20px 22px;
    font-family: 'Fraunces', Georgia, serif; font-size: 19px; line-height: 1.55;
    outline: none; transition: border-color 0.2s;
  }
  .prompt-box textarea:focus { border-color: var(--accent); }

<script>
/* BookRuntime — shared renderer + flip engine for all BOOK pages.
 * Single source of truth: consumed by index.html (composer) and player.html (library).
 * Node vocabulary is the union of the two producers:
 *   - reverse-engineered wrap.co JSON (player): textbox, image(url), box, gallery,
 *     button(css content label), action, location, youtube, widget, flow, background, end
 *   - the story compiler (composer): image(hue/lbl), gradation, veil, outline,
 *     textbox, button(label), action, youtube, map, gallery, end
 */
(function (global) {
  'use strict';

  var GRADATION_ASSET = '26e27ad1';   /* wrap.co's shared dark-gradient overlay PNG */
  var OUTLINE_ASSET   = '66f61527';   /* wrap.co's shared white outline-frame PNG  */

  /* ---------- helpers ---------- */

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  /* Only allow safe link schemes — model- or JSON-supplied URLs must never
   * become javascript:/data: sinks (they'd run with access to localStorage). */
  function safeUrl(url) {
    if (typeof url !== 'string') return null;
    var u = url.trim();
    if (/^(https?:|mailto:|tel:)/i.test(u)) return u;
    return null;
  }

  function applyCss(el, css) {
    if (!css) return;
    for (var k in css) {
      if (k === 'content') continue; /* button labels ride in css.content; render() reads it as text */
      el.style.setProperty(k, css[k]);
    }
    if (!css.position || css.position !== 'absolute') el.style.position = 'absolute';
  }

  function grad(h1, h2) {
    return 'linear-gradient(160deg, hsl(' + h1 + ',30%,36%), hsl(' + h2 + ',34%,14%))';
  }

  /* Logical canvas height for the adaptive canvas: follows the viewport
   * aspect, clamped between the classic 910 and a modern tall phone. */
  function canvasHeight() {
    var w = global.innerWidth || 640, h = global.innerHeight || 910;
    return Math.max(910, Math.min(1390, Math.round(640 * h / w)));
  }

  /* Real photographs live behind our own /api/images/ ids (or https, for
   * future CDN serving) — anything else stays a duotone placeholder. */
  function imageSrc(url) {
    if (typeof url !== 'string') return null;
    var u = url.trim();
    if (/^https:\/\//i.test(u) || /^\/api\/images\//.test(u)) return u;
    return null;
  }

  /* Lay a real image over a slot's duotone placeholder; it fades in on
   * load, so books are viewable the instant the placeholders render.
   * Called at render time (stored urls) and by the composer's fan-out
   * as freshly generated images land. */
  function attachImage(el, url) {
    var src = imageSrc(url);
    if (!src || el.querySelector('.img-real')) return;
    var im = document.createElement('img');
    im.className = 'img-real';
    im.alt = '';
    im.decoding = 'async';
    im.loading = 'lazy';
    im.addEventListener('load', function () { im.classList.add('loaded'); });
    im.src = src;
    el.appendChild(im);
  }

  function hashHue(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
    return h % 360;
  }

  function extLink(el, url) {
    var u = safeUrl(url);
    if (!u) return false;
    el.href = u;
    if (u.indexOf('tel:') !== 0 && u.indexOf('mailto:') !== 0) {
      el.target = '_blank'; el.rel = 'noopener noreferrer';
    }
    return true;
  }

  /* ---------- component renderer ---------- */
  /* ctx: { bookName, player } — player provides showCard(i) for the end-card replay. */

  function render(node, parent, ctx) {
    var t = node.t, el;

    if (t === 'image') {
      var url = node.url || '';
      var isGrad = url.indexOf(GRADATION_ASSET) !== -1 || /gradation|overlay/i.test(node.n || '');
      var isOutline = url.indexOf(OUTLINE_ASSET) !== -1 || /outline/i.test(node.n || '');
      el = document.createElement('div');
      el.className = 'cmp ' + (isGrad ? 'cmp-gradation' : isOutline ? 'cmp-outline' : 'cmp-image');
      applyCss(el, node.css);
      if (!isGrad && !isOutline) {
        var h1 = (node.hue && node.hue[0] != null) ? node.hue[0] : hashHue(url || node.n || 'x');
        var h2 = (node.hue && node.hue[1] != null) ? node.hue[1] : (h1 + 40) % 360;
        var ph = document.createElement('div');
        ph.className = 'img-ph';
        ph.style.background = grad(h1, h2);
        var tag = document.createElement('span');
        tag.textContent = node.lbl || 'image';
        ph.appendChild(tag);
        el.appendChild(ph);
        /* slot key: how the composer's image fan-out finds this element */
        if (node.slot != null) el.setAttribute('data-slot', node.slot);
        attachImage(el, url);
      }
    }
    else if (t === 'gradation' || t === 'veil') {
      el = document.createElement('div');
      el.className = 'cmp ' + (t === 'veil' ? 'cmp-veil' : 'cmp-gradation');
      applyCss(el, node.css);
    }
    else if (t === 'outline') {
      el = document.createElement('div');
      el.className = 'cmp cmp-outline';
      applyCss(el, node.css);
    }
    else if (t === 'textbox') {
      el = document.createElement('div');
      el.className = 'cmp';
      applyCss(el, node.css);
      el.innerHTML = (node.text || '').replace(/\n/g, ' ');
    }
    else if (t === 'box' || t === 'background') {
      el = document.createElement('div');
      el.className = 'cmp';
      applyCss(el, node.css);
    }
    else if (t === 'button') {
      el = document.createElement('div');
      el.className = 'cmp cmp-button';
      applyCss(el, node.css);
      var label = node.label;
      if (label == null && node.css && node.css.content) {
        label = String(node.css.content).replace(/^['"]|['"]$/g, '');
      }
      el.textContent = label || '';
    }
    else if (t === 'action') {
      el = document.createElement('a');
      el.className = 'cmp cmp-action';
      applyCss(el, node.css);
      var au = safeUrl(node.url);
      if (au && au !== 'http://' && au !== 'https://') extLink(el, au);
      el.setAttribute('aria-label', node.n || 'link');
    }
    else if (t === 'youtube') {
      el = document.createElement('a');
      el.className = 'cmp cmp-youtube';
      applyCss(el, node.css);
      extLink(el, node.url);
      el.setAttribute('aria-label', 'Play video');
      el.innerHTML = '<svg viewBox="0 0 100 100" aria-hidden="true">' +
        '<circle cx="50" cy="50" r="46" fill="rgba(0,0,0,0.45)" stroke="#fff" stroke-width="5"/>' +
        '<polygon points="40,30 74,50 40,70" fill="#fff"/></svg>';
    }
    else if (t === 'widget') {
      el = document.createElement('a');
      el.className = 'cmp cmp-widget';
      applyCss(el, node.css);
      extLink(el, node.url);
      var wlabel = /typeform/i.test(node.n || '') ? 'Open Form' : (node.n || 'Open');
      el.innerHTML = '<span>' + escapeHtml(wlabel) + '</span>';
      el.title = node.n || '';
    }
    else if (t === 'flow') {
      el = document.createElement('div');
      el.className = 'cmp cmp-flow';
      applyCss(el, node.css);
      el.innerHTML = '<svg width="24" height="29" viewBox="0 0 35 42" fill="none" aria-hidden="true">' +
        '<rect x="2" y="2" width="31" height="38" rx="4" stroke="#fff" stroke-width="3"/>' +
        '<path d="M9 12 H26 M9 20 H26 M9 28 H18" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>' +
        '<span>' + escapeHtml(node.n || 'Form') + '</span>';
      el.title = 'Form (original service offline)';
    }
    else if (t === 'location' || t === 'map') {
      var isMap = t === 'map' || (node.b || []).indexOf('locationMap') !== -1;
      el = document.createElement('a');
      el.href = 'https://maps.google.com/?q=' + encodeURIComponent(node.value || '');
      el.target = '_blank'; el.rel = 'noopener noreferrer';
      el.title = node.value || '';
      applyCss(el, node.css);
      if (isMap) {
        el.className = 'cmp cmp-map';
        el.innerHTML =
          '<svg class="map-bg" viewBox="0 0 640 910" preserveAspectRatio="xMidYMid slice" aria-hidden="true">' +
          '<rect width="640" height="910" fill="#2a2d31"/>' +
          '<g stroke="#3c4046" stroke-width="10"><path d="M-20 200 H660 M-20 430 H660 M-20 660 H660 M120 -20 V930 M330 -20 V930 M520 -20 V930"/></g>' +
          '<g stroke="#43474d" stroke-width="22"><path d="M-20 320 H660 M240 -20 V930"/></g>' +
          '<path d="M-20 780 Q320 700 660 800" stroke="#39546b" stroke-width="26" fill="none"/></svg>' +
          '<div class="map-pin"><svg width="52" height="66" viewBox="0 0 20 26" fill="none">' +
          '<path d="M10 1 C5 1 1.5 4.8 1.5 9.4 C1.5 15.6 10 25 10 25 C10 25 18.5 15.6 18.5 9.4 C18.5 4.8 15 1 10 1 Z" fill="#e8534a"/>' +
          '<circle cx="10" cy="9.4" r="3.4" fill="#fff"/></svg>' +
          '<span>' + escapeHtml(node.value || '') + '</span></div>';
      } else {
        el.className = 'cmp cmp-location';
        el.innerHTML = '<svg width="20" height="26" viewBox="0 0 20 26" fill="none" aria-hidden="true">' +
          '<path d="M10 1 C5 1 1.5 4.8 1.5 9.4 C1.5 15.6 10 25 10 25 C10 25 18.5 15.6 18.5 9.4 C18.5 4.8 15 1 10 1 Z" fill="#fff"/>' +
          '<circle cx="10" cy="9.4" r="3.4" fill="#212121"/></svg>' +
          '<span>Store Locator</span>';
      }
    }
    else if (t === 'end') {
      el = document.createElement('div');
      el.className = 'cmp cmp-end';
      applyCss(el, node.css);
      el.innerHTML = '<p>' + escapeHtml(ctx.bookName || '') + '</p>' +
        '<div class="end-wordmark">BOOK<b>.</b></div>';
      var rb = document.createElement('button');
      rb.className = 'replay'; rb.type = 'button'; rb.textContent = 'Replay';
      rb.addEventListener('click', function () { if (ctx.player) ctx.player.showCard(0); });
      el.appendChild(rb);
    }
    else if (t === 'gallery') {
      el = document.createElement('div');
      el.className = 'cmp-gallery';
      if ((node.b || []).indexOf('vertical-freescroll') !== -1) el.style.scrollSnapType = 'none';
      (node.k || []).forEach(function (item) {
        var it = document.createElement('div');
        it.className = 'cmp-gallery-item';
        if (item.css) {
          applyCss(it, item.css);
          it.style.position = 'relative'; it.style.top = ''; it.style.left = '';
        }
        (item.k || []).forEach(function (ch) { render(ch, it, ctx); });
        el.appendChild(it);
      });
      parent.appendChild(el);
      if ((node.k || []).length > 1) {
        var hint = document.createElement('div');
        hint.className = 'gallery-hint';
        hint.innerHTML = '<svg width="46" height="24" viewBox="0 0 46 24" fill="none"><path d="M4 4 L23 19 L42 4" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        parent.appendChild(hint);
        el.addEventListener('scroll', function () {
          hint.classList.toggle('hidden', el.scrollTop > 60);
        }, { passive: true });
      }
      return;
    }
    else { return; }

    parent.appendChild(el);
    (node.k || []).forEach(function (ch) { render(ch, el, ctx); });
  }

  /* ---------- player factory: flip mechanics (verbatim from wrap.co main.css) ---------- */
  /* opts: { screen, container, prevBtn, nextBtn, pageBar, tapLeft, tapRight,
   *         keyGate()  -> bool   (should arrow keys act right now)
   *         onLoaded(book)       (page hook: set title, chrome, ...) }        */

  function createPlayer(opts) {
    var screenEl = opts.screen, container = opts.container;
    var prevBtn = opts.prevBtn, nextBtn = opts.nextBtn, pageBar = opts.pageBar;
    var cards = [], total = 0, current = 0, animating = false;
    var canvasH = 910;
    var api = {};

    function rescale() {
      var s = screenEl.clientWidth / 640;
      /* screens taller than the loaded canvas get it centered; the card
       * background fills the rest */
      var top = Math.max(0, (screenEl.clientHeight - canvasH * s) / 2);
      Array.prototype.forEach.call(screenEl.querySelectorAll('.canvas'), function (cv) {
        cv.style.transform = 'scale(' + s + ')';
        cv.style.top = top + 'px';
      });
    }
    if (window.ResizeObserver) new ResizeObserver(rescale).observe(screenEl);
    else window.addEventListener('resize', rescale);

    function update() {
      if (current > 0 && cards[0]) cards[0].classList.remove('animate-swipe-hint');
      cards.forEach(function (c, i) { c.classList.toggle('turned', i < current); });
      pageBar.style.left = (current * 100 / total) + '%';
      prevBtn.hidden = current === 0;
      nextBtn.hidden = current === total - 1;
    }

    function go(dir) {
      if (animating) return;
      var next = current + dir;
      if (next < 0 || next >= total) return;
      animating = true; current = next; update();
      setTimeout(function () { animating = false; }, 420);
    }

    api.loadBook = function (w) {
      container.innerHTML = '';
      cards = []; current = 0;
      canvasH = w.height || 910;
      /* canvas + gallery-item heights follow the compiled book */
      screenEl.style.setProperty('--canvas-h', canvasH + 'px');
      var ctx = { bookName: w.name, player: api };
      (w.cards || []).forEach(function (cardNode, i) {
        var card = document.createElement('section');
        card.className = 'card';
        card.style.zIndex = String(500 - i);
        var bg = cardNode.bg || (cardNode.css && cardNode.css['background-color']);
        if (bg) card.style.background = bg;
        var canvas = document.createElement('div');
        canvas.className = 'canvas';
        (cardNode.k || []).forEach(function (ch) { render(ch, canvas, ctx); });
        card.appendChild(canvas);
        var fold = document.createElement('div');
        fold.className = 'fold';
        card.appendChild(fold);
        container.appendChild(card);
        cards.push(card);
      });
      total = cards.length;
      pageBar.style.width = (100 / total) + '%';
      rescale();
      /* wrap.co's first-time "flip me" hint, verbatim keyframes in runtime.css */
      cards[0].classList.add('animate-swipe-hint');
      cards[0].addEventListener('animationend', function () {
        cards[0].classList.remove('animate-swipe-hint');
      });
      update();
      if (opts.onLoaded) opts.onLoaded(w);
    };
    api.go = go;
    api.showCard = function (i) { current = Math.max(0, Math.min(total - 1, i)); update(); };
    api.cardCount = function () { return total; };

    nextBtn.addEventListener('click', function () { go(1); });
    prevBtn.addEventListener('click', function () { go(-1); });
    if (opts.tapRight) opts.tapRight.addEventListener('click', function () { go(1); });
    if (opts.tapLeft) opts.tapLeft.addEventListener('click', function () { go(-1); });
    document.addEventListener('keydown', function (e) {
      if (opts.keyGate && !opts.keyGate()) return;
      if (e.key === 'ArrowRight') go(1);
      else if (e.key === 'ArrowLeft') go(-1);
    });

    /* live drag flip around the left spine */
    var drag = null;
    screenEl.addEventListener('pointerdown', function (e) {
      if (e.target.closest('button') || e.target.closest('a')) return;
      if (opts.dragGate && !opts.dragGate()) return;
      drag = { x: e.clientX, y: e.clientY, mode: null, card: null, fwd: true, dx: 0 };
    });
    screenEl.addEventListener('pointermove', function (e) {
      if (!drag) return;
      var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      if (!drag.mode) {
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 10) return;
        if (Math.abs(dx) <= Math.abs(dy)) { drag = null; return; } // vertical → galleries scroll natively
        drag.mode = 'h'; drag.fwd = dx < 0;
        if (!drag.fwd && current === 0) { drag = null; return; }
        drag.card = drag.fwd ? cards[current] : cards[current - 1];
        drag.card.style.transition = 'none';
        var f0 = drag.card.querySelector('.fold');
        if (f0) f0.style.transition = 'none';
        try { screenEl.setPointerCapture(e.pointerId); } catch (err) {}
      }
      if (drag.mode !== 'h' || !drag.card) return;
      var w = screenEl.clientWidth, rot;
      if (drag.fwd) {
        if (current >= total - 1) rot = Math.max(-8, dx / w * 30); // edge resistance
        else rot = Math.max(-90, Math.min(0, dx / w * 110));
      } else {
        rot = Math.min(0, Math.max(-90, -90 + dx / w * 110));
      }
      drag.card.style.transform = 'rotateY(' + rot + 'deg)';
      var fd = drag.card.querySelector('.fold');
      if (fd) fd.style.opacity = String(Math.min(1, -rot / 90));
      drag.dx = dx;
    });
    function endDrag() {
      if (!drag) return;
      if (drag.mode === 'h' && drag.card) {
        var w = screenEl.clientWidth;
        var commit = Math.abs(drag.dx) > w * 0.18;
        drag.card.style.transition = '';
        var fd = drag.card.querySelector('.fold');
        if (fd) { fd.style.transition = ''; fd.style.opacity = ''; }
        drag.card.style.transform = '';
        if (commit) {
          if (drag.fwd && current < total - 1) current += 1;
          else if (!drag.fwd && current > 0) current -= 1;
        }
        update();
      }
      drag = null;
    }
    screenEl.addEventListener('pointerup', endDrag);
    screenEl.addEventListener('pointercancel', endDrag);

    return api;
  }

  global.BookRuntime = {
    render: render,
    createPlayer: createPlayer,
    canvasHeight: canvasHeight,
    escapeHtml: escapeHtml,
    safeUrl: safeUrl,
    imageSrc: imageSrc,
    attachImage: attachImage,
    applyCss: applyCss,
    grad: grad,
    hashHue: hashHue
  };
})(window);

<script>
/* BookCompiler — semantic story cards → primitive layout nodes.
 * The generation contract lives here in one place: the JSON schema the model
 * must emit (STORY_SCHEMA), the prompt that teaches it the card types
 * (SYSTEM_PROMPT), the compiler that maps those cards onto the layouts
 * reverse-engineered from real wrap.co examples, and a schema-exercising SAMPLE.
 * Depends on BookRuntime (escapeHtml). */
(function (global) {
  'use strict';

  var escapeHtml = global.BookRuntime.escapeHtml;

  function fitFont(text, base, perChar) {
    var len = (text || '').length;
    if (len <= perChar) return base;
    return Math.max(30, Math.round(base * perChar / len));
  }
  function num(v, d) { var n = parseInt(v, 10); return isNaN(n) ? d : ((n % 360) + 360) % 360; }
  /* slot is the image's address in the story ("3" = card 3, "2.1" =
   * gallery card 2 item 1) — how the API's image fan-out targets it.
   * image.url is set server-side once a photograph is generated. */
  function img(css, image, slot) {
    image = image || {};
    return {
      t: 'image', css: css, hue: [num(image.h1, 220), num(image.h2, 260)],
      lbl: image.label || '', url: image.url || '', slot: slot
    };
  }
  function tb(text, css) { return { t: 'textbox', text: text, css: css }; }

  var MONT = "'Montserrat', sans-serif", SLAB = "'Josefin Slab', Georgia, serif", OPEN = "'Open Sans', sans-serif";
  var WHITE = 'rgba(253,254,255,1)';

  function center(top, size, family, opts) {
    opts = opts || {};
    return {
      position: 'absolute', top: top + 'px', left: (opts.left != null ? opts.left : 0) + 'px',
      width: (opts.width != null ? opts.width : 640) + 'px',
      'text-align': 'center', color: WHITE, 'font-family': family,
      'font-size': size + 'px', 'line-height': String(opts.lh || 1.1),
      'padding-top': '10px', 'padding-bottom': '10px', 'z-index': '10'
    };
  }
  /* Card background for full-bleed image cards: a deep tone of the image's
   * primary hue, so the screen-fill area on tall phones blends with the
   * image instead of showing white bars. */
  function inkBg(image) {
    return 'hsl(' + num(image && image.h1, 220) + ', 30%, 10%)';
  }

  /* ---------- the adaptive canvas ----------
   * Layouts are anchored bands, not fixed coordinates. The logical canvas
   * is 640 wide and H tall, where H follows the viewer's screen aspect
   * (910 on the classic 0.70 frame, up to 1390 on a modern tall phone).
   * The band values (30px cover inset, headline 320 above the bottom,
   * gallery text 355/295/210 above the bottom, ...) preserve the design
   * language reverse-engineered from real wrap.co examples at H = 910:
   *   top(y)  — fixed distance from the top edge
   *   mid(y)  — the element group stays optically centered
   *   bot(y)  — fixed distance from the bottom edge (y as designed at 910)
   */
  function compileCard(c, H, idx) {
    var k = [];
    var t = c.type;
    var slot = String(idx);
    var title = c.title || '', body = c.body || '', kicker = c.kicker || '';
    var midShift = Math.round((H - 910) / 2);
    var botShift = H - 910;
    function mid(y) { return y + midShift; }
    function bot(y) { return y + botShift; }
    var FULL = { position: 'absolute', top: '0px', left: '0px', width: '640px', height: H + 'px' };

    if (t === 'cover') {
      k.push(img({ position: 'absolute', top: '30px', left: '30px', width: '580px', height: (H - 55) + 'px' }, c.image, slot));
      k.push({ t: 'gradation', css: { position: 'absolute', top: '61px', left: '31px', width: '579px', height: (H - 87) + 'px' } });
      var tsize = fitFont(title, 80, 12);
      k.push(tb(escapeHtml(title), center(bot(590) + (80 - tsize), tsize, MONT, { left: 31, width: 580, lh: 1.02 })));
      if (kicker) k.push(tb(escapeHtml(kicker), center(bot(700), fitFont(kicker, 40, 26), SLAB, { left: 30, width: 580 })));
      return { bg: '#fff', k: k };
    }
    if (t === 'quote') {
      k.push(img(FULL, c.image, slot));
      k.push({ t: 'veil', css: FULL });
      k.push({ t: 'outline', css: FULL });
      var lines = (c.lines || []).map(escapeHtml);
      if (c.attribution) lines.push('<i>— ' + escapeHtml(c.attribution) + '</i>');
      var qtop = title ? 250 : 200;
      if (title) k.push(tb(escapeHtml(title), center(mid(120), fitFont(title, 64, 14), MONT)));
      k.push(tb('<p>' + lines.join('<br>') + '</p>',
        center(mid(qtop), lines.length > 10 ? 26 : 30, SLAB, { left: 80, width: 480, lh: 1.5 })));
      return { bg: inkBg(c.image), k: k };
    }
    if (t === 'prose') {
      k.push(img(FULL, c.image, slot));
      k.push({ t: 'veil', css: FULL });
      k.push({ t: 'gradation', css: FULL });
      if (kicker) k.push(tb(escapeHtml(kicker), center(mid(150), fitFont(kicker, 34, 26), SLAB)));
      k.push(tb(escapeHtml(title), center(mid(kicker ? 215 : 170), fitFont(title, 60, 16), MONT, { left: 30, width: 580, lh: 1.05 })));
      k.push(tb(escapeHtml(body), center(mid(kicker ? 360 : 320), body.length > 330 ? 26 : 30, SLAB, { left: 60, width: 520, lh: 1.45 })));
      return { bg: inkBg(c.image), k: k };
    }
    if (t === 'gallery') {
      var items = (c.items || []).slice(0, 5).map(function (it, j) {
        var ik = [];
        ik.push(img({ position: 'absolute', top: '10px', left: '10px', width: '620px', height: (H - 20) + 'px' }, it.image, slot + '.' + j));
        ik.push({ t: 'gradation', css: { position: 'absolute', top: '19px', left: '12px', width: '616px', height: (H - 34) + 'px' } });
        if (it.kicker) ik.push(tb(escapeHtml(it.kicker), center(bot(555), fitFont(it.kicker, 38, 26), SLAB, { left: 30, width: 580 })));
        var isize = fitFont(it.title || '', 60, 15);
        ik.push(tb(escapeHtml(it.title || ''), center(bot(615) + (60 - isize), isize, MONT)));
        ik.push(tb(escapeHtml(it.body || ''), center(bot(700), 26, SLAB, { left: 45, width: 550, lh: 1.35 })));
        return { k: ik };
      });
      return { bg: '#fff', k: [{ t: 'gallery', k: items }] };
    }
    if (t === 'product') {
      k.push(img(FULL, c.image, slot));
      k.push({ t: 'gradation', css: FULL });
      if (kicker) k.push(tb(escapeHtml(kicker), center(bot(540), fitFont(kicker, 34, 26), SLAB)));
      k.push(tb(escapeHtml(title), center(bot(600), fitFont(title, 50, 18), MONT, { left: 30, width: 580 })));
      var pbody = escapeHtml(body) + (c.price ? ' <b>' + escapeHtml(c.price) + '</b>' : '');
      k.push(tb(pbody, center(bot(680), 26, SLAB, { left: 60, width: 520, lh: 1.35 })));
      if (c.button) {
        k.push({ t: 'button', label: (c.button || '').toUpperCase(), css: {
          position: 'absolute', top: bot(800) + 'px', left: '100px', width: '440px', height: '68px',
          color: '#fff', border: '3px solid #fff', 'font-family': OPEN, 'font-size': '24px',
          'letter-spacing': '0.08em', 'z-index': '20'
        }});
        k.push({ t: 'action', url: c.url || '', css: { position: 'absolute', top: bot(796) + 'px', left: '97px', width: '446px', height: '76px' } });
      }
      return { bg: inkBg(c.image), k: k };
    }
    if (t === 'video') {
      k.push(img(FULL, c.image, slot));
      k.push({ t: 'veil', css: FULL });
      k.push({ t: 'youtube', url: c.url || '', css: { position: 'absolute', top: mid(355) + 'px', left: '270px', width: '100px', height: '100px', 'z-index': '100' } });
      if (title) k.push(tb(escapeHtml(title), center(bot(560), fitFont(title, 50, 18), MONT, { left: 30, width: 580 })));
      if (body) k.push(tb(escapeHtml(body), center(bot(650), 26, SLAB, { left: 60, width: 520, lh: 1.35 })));
      return { bg: inkBg(c.image), k: k };
    }
    if (t === 'map') {
      k.push({ t: 'map', value: c.address || '', css: FULL });
      if (title) k.push(tb(escapeHtml(title), center(70, fitFont(title, 56, 16), MONT)));
      return { bg: '#161718', k: k };
    }
    return null;
  }

  /* opts.height: the logical canvas height (default the classic 910).
   * Pages pass BookRuntime.canvasHeight() so books compile to the
   * viewer's screen; the shelf pins 910 for consistent thumbnails. */
  function compileBook(story, opts) {
    var H = (opts && opts.height) || 910;
    var out = { name: story.name || 'Untitled', height: H, cards: [] };
    (story.cards || []).forEach(function (c, i) {
      var compiled = compileCard(c || {}, H, i);
      if (compiled) out.cards.push(compiled);
    });
    // end-of-book card, always appended
    out.cards.push({
      bg: '#2e2d2c',
      k: [{ t: 'end', css: { position: 'absolute', top: (Math.round((H - 910) / 2) + 215) + 'px', left: '0px', width: '640px', height: '480px' } }]
    });
    return out;
  }

  /* ---------- the generation contract ---------- */

  /* The generation contract is shared with the server API — single source in api/src/contract/. */
  var STORY_SCHEMA = {
  "type": "object", "additionalProperties": false,
  "required": ["name", "cards"],
  "properties": {
    "name": { "type": "string" },
    "cards": {
      "type": "array",
      "items": {
        "type": "object", "additionalProperties": false,
        "required": ["type", "kicker", "title", "body", "lines", "attribution", "price", "button", "url", "address", "image", "items"],
        "properties": {
          "type": { "type": "string", "enum": ["cover", "quote", "prose", "gallery", "product", "video", "map"] },
          "kicker": { "type": ["string", "null"] },
          "title": { "type": ["string", "null"] },
          "body": { "type": ["string", "null"] },
          "lines": { "type": ["array", "null"], "items": { "type": "string" } },
          "attribution": { "type": ["string", "null"] },
          "price": { "type": ["string", "null"] },
          "button": { "type": ["string", "null"] },
          "url": { "type": ["string", "null"] },
          "address": { "type": ["string", "null"] },
          "image": {
            "type": ["object", "null"], "additionalProperties": false,
            "required": ["h1", "h2", "label"],
            "properties": {
              "h1": { "type": "integer" }, "h2": { "type": "integer" }, "label": { "type": "string" }
            }
          },
          "items": {
            "type": ["array", "null"],
            "items": {
              "type": "object", "additionalProperties": false,
              "required": ["kicker", "title", "body", "image"],
              "properties": {
                "kicker": { "type": ["string", "null"] },
                "title": { "type": "string" },
                "body": { "type": "string" },
                "image": {
                  "type": ["object", "null"], "additionalProperties": false,
                  "required": ["h1", "h2", "label"],
                  "properties": { "h1": { "type": "integer" }, "h2": { "type": "integer" }, "label": { "type": "string" } }
                }
              }
            }
          }
        }
      }
    }
  }
}
;

  var SYSTEM_PROMPT = ([
  "You are a story designer for BOOK, a mobile flip-book format: a phone-sized stack of full-screen cards the reader swipes through.",
  "Given a story idea, compose a book of 5 to 8 cards using these card types:",
  "- cover: the opening card. title (2-4 words, evocative) + kicker (a one-line subtitle). Always first.",
  "- prose: a narrative beat. kicker (optional small line), title (2-5 words), body (2-4 sentences, warm and concrete).",
  "- gallery: 3-4 moments the reader scrolls through vertically. Each item: kicker (place/context, 1-3 words), title (2-3 words), body (1-2 sentences).",
  "- quote: a poem, letter excerpt, or meaningful quotation. lines (each line short), attribution (optional). Use at most once.",
  "- product: something offered or celebrated, with a call to action. title, body, optional price (like \"$18\"), button (2-3 words), url (real if given or verified, else null).",
  "- video: only if the user mentions a video or gives a YouTube link. url required.",
  "- map: only if the story has a real place worth visiting. address = the street address or place name. title like \"VISIT US\".",
  "",
  "Accuracy rules - these outrank style:",
  "- Build from the user's details. Never invent facts: no made-up names, dates, addresses, prices, URLs, or historical claims the user didn't give you. You may invent atmosphere (weather, light, small sensory detail) - never verifiable specifics.",
  "- If web search is available and the story involves a real business, venue, event, or public place, search to ground it: the real address for a map card, real hours/prices/URLs for a product card, correct spellings and dates. If you can't verify a fact, leave that field null or omit the card - a smaller true book beats a padded invented one.",
  "- Only attribute a quotation to a real person if it is genuinely theirs. Otherwise attribute it to someone in the story, or leave attribution null.",
  "",
  "Every card and gallery item needs an image. Its label is the brief a photographer would shoot from: 4-8 concrete words naming subject, setting, and light or time of day (e.g. \"weathered lighthouse on a cliff at dusk\", \"flour-dusted hands shaping dough, morning window light\"). Photographable things only - no abstractions, no emotions as subjects, no readable text or signage, no real people's names or likenesses. h1 and h2 are HSL hues 0-359 evoking the scene (the renderer draws a dark duotone gradient until the photo arrives - warm 10-50, golden 40-60, green 90-150, teal 170-200, blue 200-250, violet 250-290, rose 300-340).",
  "",
  "Composition rules: exactly one cover, first. Sequence like a small book - the cover makes a promise, the middle develops it (prose and gallery carry the story), and the last card lands it (a quote, a map, or a closing prose beat). Vary card types; never two galleries. Pick one palette family for the whole book and let hues drift within it, so the book reads as one color story. Fields that do not apply to a card type must be null. Do not add a closing card - the player appends one. name = a short title for the whole book.",
  "Write with specificity and heart, in the register the story calls for - a love story is not a product launch."
]
).join('\n');

  /* Built-in sample — exercises every layout without an API call */
  var SAMPLE = {
    name: 'The Lighthouse Summer',
    cards: [
      { type: 'cover', title: 'The Lighthouse Summer', kicker: 'Three months on Wren Island',
        image: { h1: 210, h2: 250, label: 'lighthouse at dusk' } },
      { type: 'prose', kicker: 'June', title: 'The Arrival',
        body: 'The ferry only runs twice a week, so when I stepped onto the dock with two suitcases and a typewriter, I knew there was no changing my mind. The keeper’s cottage smelled of salt and cedar.',
        image: { h1: 195, h2: 220, label: 'ferry crossing gray water' } },
      { type: 'gallery', items: [
        { kicker: 'Week One', title: 'The Light', body: 'Forty-two steps up. I counted them every night at eight, and every night the sea looked different.',
          image: { h1: 45, h2: 25, label: 'lamp room at golden hour' } },
        { kicker: 'Week Four', title: 'The Storm', body: 'Three days of wind that bent the grass flat. I read every book in the cottage twice.',
          image: { h1: 230, h2: 260, label: 'storm over the north cliffs' } },
        { kicker: 'Week Nine', title: 'The Whales', body: 'A pod of grays passed so close I could hear them breathe. I forgot to take a single photo.',
          image: { h1: 180, h2: 210, label: 'whale spouts offshore' } }
      ]},
      { type: 'quote',
        lines: ['The sea does not reward', 'those who are too anxious,', 'too greedy, or too impatient.', 'Patience, patience, patience,', 'is what the sea teaches.'],
        attribution: 'Anne Morrow Lindbergh',
        image: { h1: 250, h2: 290, label: 'night sea under stars' } },
      { type: 'map', title: 'WREN ISLAND', address: 'Wren Island Lighthouse, San Juan Islands, WA' }
    ]
  };

  global.BookCompiler = {
    compileBook: compileBook,
    STORY_SCHEMA: STORY_SCHEMA,
    SYSTEM_PROMPT: SYSTEM_PROMPT,
    SAMPLE: SAMPLE
  };
})(window);

</script>
<script>
(function () {
  'use strict';

  /* ---------- player (shared engine) ---------- */
  var playerStage = document.getElementById('playerStage');
  var player = BookRuntime.createPlayer({
    screen: document.getElementById('screen'),
    container: document.getElementById('cardContainer'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    pageBar: document.getElementById('pageBar'),
    tapLeft: document.getElementById('tapLeft'),
    tapRight: document.getElementById('tapRight'),
    keyGate: function () { return !playerStage.hidden; },
    onLoaded: function (w) { document.title = w.name + ' — BOOK'; }
  });

  /* ---------- generation: the hosted API, server-side ----------
   * Returns the story, or null when no server is available (static
   * hosting, or the API has no model keys configured). Real generation
   * errors throw. */
  async function generateServer(storyText) {
    var res;
    try {
      res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ story: storyText })
      });
    } catch (e) {
      return null; // no API at all (static hosting) — fall back
    }
    if (res.status === 404 || res.status === 405) return null;
    var data = null;
    try { data = await res.json(); } catch (e) {}
    if (res.status === 503 && data && data.error === 'NOT_CONFIGURED') return null;
    if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
    return data.story;
  }

  /* ---------- UI wiring ---------- */
  var homeView = document.getElementById('homeView');
  var storyInput = document.getElementById('storyInput');
  var generateBtn = document.getElementById('generateBtn');
  var loading = document.getElementById('loading');
  var errorBox = document.getElementById('errorBox');
  var lastStoryText = '';
  var lastStory = null;

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.hidden = false;
  }
  function showPlayer(story) {
    try {
      var book = BookCompiler.compileBook(story, { height: BookRuntime.canvasHeight() });
      if (book.cards.length < 2) throw new Error('Empty book');
      homeView.classList.add('hidden');
      playerStage.hidden = false;
      lastStory = story;
      lastShareId = null; /* a fresh book hasn't been shared yet */
      player.loadBook(book);
    } catch (e) {
      showError('Could not render the generated book: ' + e.message);
    }
  }
  function showHome() {
    playerStage.hidden = true;
    homeView.classList.remove('hidden');
  }
  document.getElementById('backBtn').addEventListener('click', showHome);
  document.getElementById('regenBtn').addEventListener('click', function () {
    showHome();
    if (lastStoryText) runGenerate(lastStoryText);
  });
  document.addEventListener('keydown', function (e) {
    if (!playerStage.hidden && e.key === 'Escape') showHome();
  });

  /* ---------- share: persist the story via the hosted API ---------- */
  var shareBtn = document.getElementById('shareBtn');
  var shareToast = document.getElementById('shareToast');
  var toastTimer = null;

  function toast(html, sticky) {
    shareToast.innerHTML = html;
    shareToast.hidden = false;
    clearTimeout(toastTimer);
    if (!sticky) toastTimer = setTimeout(function () { shareToast.hidden = true; }, 8000);
  }

  var lastShareId = null;

  /* ---------- images: client-driven fan-out ----------
   * After a share, request one photograph per image slot; each lands on
   * the stored book server-side and fades in over its duotone placeholder
   * here (render() tags slot elements with data-slot). Sequential on
   * purpose: one image per call stays under the API's response cap, and
   * a provider that isn't configured stops the whole run on the first
   * 503 — placeholders simply remain. */
  function applyImageUrl(story, key, url) {
    var m = /^(\d+)(?:\.(\d+))?$/.exec(key || '');
    if (!m || !story) return;
    var card = (story.cards || [])[+m[1]];
    if (!card) return;
    var target = m[2] == null ? card : (card.items || [])[+m[2]];
    if (target && target.image) target.image.url = url;
  }

  function setImageNote(text) {
    var note = document.getElementById('imgNote');
    if (note) { if (text) note.textContent = text; else note.remove(); }
  }

  async function fanOutImages(id, slots) {
    for (var i = 0; i < (slots || []).length; i++) {
      if (lastShareId !== id) return; // a newer share took over
      var res;
      try {
        res = await fetch('/api/books/' + encodeURIComponent(id) + '/images', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slot: slots[i] })
        });
      } catch (e) { setImageNote(null); return; }
      if (res.status === 503 || res.status === 429) { setImageNote(null); return; }
      if (!res.ok) continue; // one bad slot shouldn't stop the rest
      var d = null;
      try { d = await res.json(); } catch (e) { continue; }
      if (!d || !d.url) continue;
      applyImageUrl(lastStory, d.slot, d.url);
      Array.prototype.forEach.call(
        document.querySelectorAll('[data-slot="' + d.slot + '"]'),
        function (el) { BookRuntime.attachImage(el, d.url); }
      );
    }
    setImageNote('The pictures are in.');
  }

  /* Publish the shared book into the public gallery feed. */
  shareToast.addEventListener('click', async function (e) {
    var btn = e.target.closest('#galleryBtn');
    if (!btn || !lastShareId) return;
    btn.disabled = true;
    btn.textContent = 'Adding…';
    try {
      var res = await fetch('/api/books/' + encodeURIComponent(lastShareId) + '/publish', { method: 'POST' });
      var data = null;
      try { data = await res.json(); } catch (err) {}
      if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
      toast('On the shelf — <a href="library.html">see the library →</a>', true);
    } catch (err) {
      toast('Couldn’t add it to the library' + (err && err.message ? ': ' + BookRuntime.escapeHtml(err.message) : ''));
    }
  });

  /* Store the current book once; Share and ＋ Library both go through
   * here, so whichever is tapped first creates the document and kicks
   * off the image fan-out. */
  async function ensureShared() {
    if (lastShareId) return { id: lastShareId, slots: null };
    var res = await fetch('/api/books', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ story: lastStory })
    });
    var data = null;
    try { data = await res.json(); } catch (e) {}
    if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
    lastShareId = data.id;
    var slots = data.imageSlots || [];
    if (slots.length) fanOutImages(data.id, slots);
    return { id: data.id, slots: slots };
  }

  function paintingNote(slots) {
    return slots && slots.length
      ? '<br><span id="imgNote">Painting the pictures — they’ll fade in as they finish.</span>'
      : '';
  }

  shareBtn.addEventListener('click', async function () {
    if (!lastStory) return;
    shareBtn.disabled = true;
    shareBtn.textContent = 'Sharing…';
    try {
      var shared = await ensureShared();
      var link = location.origin + '/b/' + shared.id;
      var copied = false;
      try { await navigator.clipboard.writeText(link); copied = true; } catch (e) {}
      toast((copied ? 'Link copied — ' : 'Your book link: ') +
        '<a href="' + link + '" target="_blank" rel="noopener noreferrer">' + link + '</a>' +
        '<button type="button" id="galleryBtn">Add to the library</button>' +
        paintingNote(shared.slots),
        true);
    } catch (e) {
      toast('Sharing isn’t available here' +
        (e && e.message ? ' (' + BookRuntime.escapeHtml(e.message) + ')' : '') +
        ' — it needs the hosted API. See ARCHITECTURE.md.');
    } finally {
      shareBtn.disabled = false;
      shareBtn.textContent = '🔗 Share';
    }
  });

  /* ＋ Library: share (if not yet shared) and publish, in one tap. */
  var libBtn = document.getElementById('libBtn');
  libBtn.addEventListener('click', async function () {
    if (!lastStory) return;
    libBtn.disabled = true;
    libBtn.textContent = 'Saving…';
    try {
      var shared = await ensureShared();
      var res = await fetch('/api/books/' + encodeURIComponent(shared.id) + '/publish', { method: 'POST' });
      var data = null;
      try { data = await res.json(); } catch (e) {}
      if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
      toast('On the shelf — <a href="library.html">see the library →</a>' + paintingNote(shared.slots), true);
    } catch (e) {
      toast('Couldn’t save to the library' +
        (e && e.message ? ': ' + BookRuntime.escapeHtml(e.message) : ''));
    } finally {
      libBtn.disabled = false;
      libBtn.textContent = '＋ Library';
    }
  });

  async function runGenerate(text) {
    errorBox.hidden = true;
    generateBtn.disabled = true;
    loading.hidden = false;
    lastStoryText = text;
    try {
      var story = await generateServer(text);
      if (story === null) {
        showError('Generation isn’t available on this copy of the site — it needs the hosted deployment.');
        return;
      }
      showPlayer(story);
    } catch (e) {
      showError('Generation failed: ' + e.message);
    } finally {
      generateBtn.disabled = false;
      loading.hidden = true;
    }
  }

  generateBtn.addEventListener('click', function () {
    var text = storyInput.value.trim();
    if (!text) { showError('Tell a story first — a sentence or two is enough.'); return; }
    runGenerate(text);
  });
  storyInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generateBtn.click();
  });
})();
</script>
